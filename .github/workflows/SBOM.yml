name: Task E - SBOM

on:
  push:
    branches: [ "main", "master" ]

jobs:
  generate-sbom:
    name: Build and Scan Container
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate SBOM from Source
        uses: anchore/sbom-action@v0
        with:
          path: "."
          format: "cyclonedx-json"
          output-file: "sbom_source.json"
          artifact-name: "source-sbom"

      - name: Build local container image
        run: docker build -t temp-target:latest .

      - name: Generate SBOM from Image
        uses: anchore/sbom-action@v0
        with:
          image: "temp-target:latest"
          format: "cyclonedx-json"
          output-file: "sbom_container.json"

      - name: Save Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cyclonedx-sboms
          path: |
            sbom_source.json
            sbom_container.json